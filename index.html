<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Speed Dating</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            font-size: 2.8em;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
        }
        input {
            width: 85%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1em;
        }
        button {
            background: white;
            color: #2575fc;
            border: none;
            padding: 14px 32px;
            margin: 12px 8px;
            font-size: 1.05em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoom Speed Dating</h1>
        <p class="tagline">Meet new people • 5-minute dates • Real connections</p>

        <div class="card">
            <h2>Admin Login</h2>
            <p><strong>admin@zoomspeeddating.com</strong><br>
               Password: <strong>AdminZoom2026!</strong></p>
        </div>

        <div id="main">
            <input type="email" id="email" placeholder="Enter your email" value="demo@zoomspeeddating.com"><br>
            <button onclick="register()">Join - $20</button>
            <button onclick="login()">Login</button>
        </div>

        <div id="dashboard" style="display:none;">
            <h2>Welcome Back, <span id="userName">Alex</span></h2>
            
            <button onclick="createEvent()">Create New Event</button>
            <button onclick="joinEvent()">Join Upcoming Event</button>
            <button onclick="startDates()">Start Speed Dating Rounds</button>
            <button onclick="submitMatches()">Submit My Matches</button>
            
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById("email").value || "Participant";
            document.getElementById("main").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userName").textContent = email.split("@")[0];
            addStatus("✅ Successfully logged in");
        }

        function register() {
            alert("✅ Payment successful! $20 charged.\n\nWelcome to Zoom Speed Dating.");
            login();
        }

        function createEvent() { addStatus("🎉 New event created for 20 participants (10 men / 10 women)"); }
        function joinEvent() { addStatus("✅ You've joined the next event. 5-minute rounds begin soon."); }
        function startDates() { addStatus("🕒 Round 1 in progress • Your match is waiting in the Zoom room"); }
        function submitMatches() { addStatus("❤️ Matches submitted! You'll be notified of any mutual matches."); }

        function addStatus(message) {
            const status = document.getElementById("status");
            status.innerHTML += `<p>${message}</p>`;
        }
    </script>
</body>
</html>
