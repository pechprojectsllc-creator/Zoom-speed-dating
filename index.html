<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Speed Dating - Live Demo</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin:0; 
            background: linear-gradient(135deg, #6a11cb, #2575fc); 
            color:white; 
            text-align:center; 
            min-height:100vh; 
        }
        .container { max-width: 520px; margin: 20px auto; padding: 20px; }
        h1 { font-size: 2.4em; }
        .card { 
            background: rgba(255,255,255,0.15); 
            border-radius: 16px; 
            padding: 20px; 
            margin: 15px 0; 
        }
        button { 
            background:white; 
            color:#2575fc; 
            border:none; 
            padding:14px 28px; 
            margin:10px; 
            border-radius:50px; 
            font-weight:600; 
            cursor:pointer; 
        }
        .timer { font-size: 2.5em; font-weight: bold; color: #ffeb3b; }
        .profile { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(255,255,255,0.1); 
            padding: 15px; 
            border-radius: 12px; 
            margin: 10px 0; 
        }
        .match { background: rgba(0,255,0,0.2); border: 2px solid #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoom Speed Dating</h1>
        <p>Live Demo • 10 Participants</p>

        <div class="card">
            <h2>Round <span id="round">1</span>/10</h2>
        </div>

        <div id="datingScreen">
            <div class="card">
                <h3>Your Current Date</h3>
                <div id="currentProfile" class="profile"></div>
            </div>

            <div class="card">
                <div class="timer" id="timer">05:00</div>
                <button onclick="startTimer()">Start Timer</button>
                <button onclick="nextRound()">Next Round →</button>
            </div>

            <div class="card">
                <h3>Match with this person?</h3>
                <button onclick="like()">❤️ Yes</button>
                <button onclick="dislike()">👎 No</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" style="display:none;">
            <div class="card">
                <h2>🎉 Event Complete!</h2>
                <h3>Your Matches</h3>
                <div id="matchesList"></div>
                <button onclick="restartDemo()">Start New Event</button>
            </div>
        </div>

        <div id="status" class="card" style="display:none;"></div>
    </div>

    <script>
        const profiles = [
            { name: "Sophia, 29", bio: "Marketing Manager • Loves hiking & coffee", img: "https://i.pravatar.cc/150?img=44" },
            { name: "James, 32", bio: "Software Engineer • Gym & travel", img: "https://i.pravatar.cc/150?img=68" },
            { name: "Emma, 27", bio: "Teacher • Book lover & dog mom", img: "https://i.pravatar.cc/150?img=65" },
            { name: "Michael, 34", bio: "Entrepreneur • Foodie", img: "https://i.pravatar.cc/150?img=33" },
            { name: "Olivia, 28", bio: "Graphic Designer • Yoga", img: "https://i.pravatar.cc/150?img=45" }
        ];

        let currentIndex = 0;
        let timeLeft = 300;
        let round = 1;
        let matches = [];

        function loadProfile() {
            const p = profiles[currentIndex];
            document.getElementById('currentProfile').innerHTML = `
                <div style="width:80px;height:80px;background:url('${p.img}') center/cover;border-radius:50%;"></div>
                <div>
                    <strong>${p.name}</strong><br>
                    <small>${p.bio}</small>
                </div>
            `;
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) clearInterval(interval);
            }, 1000);
        }

        function like() {
            matches.push(profiles[currentIndex].name);
            document.getElementById('status').innerHTML = `<p>❤️ Liked ${profiles[currentIndex].name}!</p>`;
            document.getElementById('status').style.display = 'block';
        }

        function dislike() {
            document.getElementById('status').innerHTML = `<p>Moving to next round...</p>`;
            document.getElementById('status').style.display = 'block';
        }

        function nextRound() {
            if (round >= 5) {
                showResults();
                return;
            }
            currentIndex = (currentIndex + 1) % profiles.length;
            round++;
            document.getElementById('round').textContent = round;
            timeLeft = 300;
            document.getElementById('timer').textContent = "05:00";
            loadProfile();
        }

        function showResults() {
            document.getElementById('datingScreen').style.display = 'none';
            const results = document.getElementById('resultsScreen');
            results.style.display = 'block';

            const list = document.getElementById('matchesList');
            let html = matches.length ? "<p>Mutual matches will receive your contact info:</p>" : "<p>No matches this time. Try the next event!</p>";
            matches.forEach(m => html += `<div class="profile match"><strong>❤️ ${m}</strong></div>`);
            list.innerHTML = html;
        }

        function restartDemo() {
            location.reload();
        }

        // Initial load
        loadProfile();
    </script>
</body>
</html>
