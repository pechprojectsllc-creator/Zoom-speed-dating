<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Speed Dating - Live Demo</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; background: linear-gradient(135deg, #6a11cb, #2575fc); color:white; text-align:center; min-height:100vh; }
        .container { max-width: 520px; margin: 20px auto; padding: 20px; }
        h1 { font-size: 2.4em; }
        .card { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 20px; margin: 15px 0; }
        button { background:white; color:#2575fc; border:none; padding:14px 28px; margin:10px; border-radius:50px; font-weight:600; cursor:pointer; }
        .timer { font-size: 2.5em; font-weight: bold; color: #ffeb3b; }
        .profile { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoom Speed Dating</h1>
        <p>Live Demo Session • 5-Minute Dates</p>

        <div class="card">
            <h2>Demo Event: Evening Mixers</h2>
            <p>10 Men • 10 Women • Round <span id="round">1</span>/10</p>
        </div>

        <div id="currentDate" class="card">
            <h3>Your Current Date</h3>
            <div class="profile">
                <div style="width:80px;height:80px;background:url('https://i.pravatar.cc/150?img=44') center/cover;border-radius:50%;"></div>
                <div>
                    <strong>Sophia, 29</strong><br>
                    <small>Marketing Manager • Loves hiking & coffee</small>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="timer" id="timer">05:00</div>
            <button onclick="startTimer()">Start 5-Min Timer</button>
            <button onclick="nextRound()">Next Round →</button>
        </div>

        <div class="card">
            <h3>Would you like to match with Sophia?</h3>
            <button onclick="like()">❤️ Yes</button>
            <button onclick="dislike()">👎 No</button>
        </div>

        <div id="status" class="card" style="display:none;"></div>
    </div>

    <script>
        let timeLeft = 300;
        let round = 1;

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerEl.textContent = "Time's Up!";
                }
            }, 1000);
        }

        function nextRound() {
            round++;
            document.getElementById('round').textContent = round;
            timeLeft = 300;
            document.getElementById('timer').textContent = "05:00";
            document.getElementById('status').innerHTML = `<p>✅ Round ${round} started with new match!</p>`;
            document.getElementById('status').style.display = 'block';
        }

        function like() {
            document.getElementById('status').innerHTML = `<p>❤️ You liked Sophia! We'll notify you of mutual matches at the end.</p>`;
            document.getElementById('status').style.display = 'block';
        }

        function dislike() {
            document.getElementById('status').innerHTML = `<p>👎 No match. Moving to next round.</p>`;
            document.getElementById('status').style.display = 'block';
        }
    </script>
</body>
</html>
