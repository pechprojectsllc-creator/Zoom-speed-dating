<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Speed Dating</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
        }
        h1 { font-size: 2.6em; margin: 10px 0 5px; }
        .tagline { font-size: 1.15em; opacity: 0.9; margin-bottom: 30px; }

        .profiles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .profile {
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 12px;
            width: 140px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background: #ddd;
            border-radius: 50%;
            margin: 0 auto 10px;
            background-size: cover;
        }
        .name { font-weight: 600; font-size: 1.1em; }

        button {
            background: white;
            color: #2575fc;
            border: none;
            padding: 14px 32px;
            margin: 12px 8px;
            font-size: 1.05em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoom Speed Dating</h1>
        <p class="tagline">5-Minute Dates • Real People • Real Connections</p>

        <div class="profiles">
            <div class="profile">
                <div class="avatar" style="background-image: url('https://i.pravatar.cc/150?img=68');"></div>
                <div class="name">James, 32</div>
            </div>
            <div class="profile">
                <div class="avatar" style="background-image: url('https://i.pravatar.cc/150?img=44');"></div>
                <div class="name">Sophia, 28</div>
            </div>
        </div>

        <button onclick="register()">Join Now - $20</button>
        <button onclick="login()">Login</button>

        <div id="status" style="margin-top:30px; font-size:0.95em;"></div>
    </div>

    <script>
        function register() {
            alert("Payment successful! Welcome to Zoom Speed Dating.");
        }
        function login() {
            addStatus("✅ Logged in successfully. Welcome back!");
        }
        function addStatus(msg) {
            document.getElementById("status").innerHTML = msg;
        }
    </script>
</body>
</html>
